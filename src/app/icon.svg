<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!--
    Decision Intel favicon — anatomy-of-a-call pentagon
    (D1 lock 2026-04-29). Mirrors the geometry of the
    AnatomyOfACallGraph hero visualisation so the brand glyph
    is consistent across landing / how-it-works / favicon /
    OG image / email signature surfaces. Five nodes at 72°
    spacing around a central core represent the five rigor
    layers of every audit: Knowledge Graph, AI Boardroom,
    Reasoning Audit, What-if, Outcome Loop.
  -->
  <title>Decision Intel</title>

  <!-- Subtle halo behind the core -->
  <circle cx="16" cy="16" r="14" fill="#16A34A" fill-opacity="0.06" />

  <!-- Edges from core to each node -->
  <g stroke="#16A34A" stroke-width="0.9" stroke-linecap="round" stroke-opacity="0.55">
    <line x1="16" y1="16" x2="16" y2="4" />
    <line x1="16" y1="16" x2="27.4" y2="12.3" />
    <line x1="16" y1="16" x2="23" y2="26.7" />
    <line x1="16" y1="16" x2="9" y2="26.7" />
    <line x1="16" y1="16" x2="4.6" y2="12.3" />
  </g>

  <!-- Five outer nodes (pentagon vertices) -->
  <g fill="#16A34A">
    <circle cx="16" cy="4" r="1.9" />
    <circle cx="27.4" cy="12.3" r="1.9" />
    <circle cx="23" cy="26.7" r="1.9" />
    <circle cx="9" cy="26.7" r="1.9" />
    <circle cx="4.6" cy="12.3" r="1.9" />
  </g>

  <!-- Core: solid green disc with a subtle outer ring -->
  <circle cx="16" cy="16" r="5.5" fill="#16A34A" />
  <circle cx="16" cy="16" r="6.7" fill="none" stroke="#16A34A" stroke-width="0.6" stroke-opacity="0.45" />

  <!-- Monogram "D" on the core for legibility at small sizes -->
  <text
    x="16"
    y="19.6"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="7.5"
    font-weight="700"
    fill="#FFFFFF"
    letter-spacing="-0.02em"
  >D</text>
</svg>
