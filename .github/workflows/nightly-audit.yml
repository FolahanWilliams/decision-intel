name: Nightly audit

# Unattended, deterministic, REPORT-ONLY drift + regression auditor.
#
# It runs scripts/nightly-audit.mjs (tsc + the 5 ratchet/lock lint gates
# + the heuristic platform audit). It NEVER mutates code, NEVER pushes,
# NEVER touches main. On a clean night it is silent (just a green run in
# the Actions tab + a step summary). On a P0 regression it opens / updates
# ONE rolling tracking issue assigned to the founder.
#
# Why this shape (decided 2026-05-17): an unattended job auto-pushing to
# main = a no-human-gate production deploy on the codebase that IS the
# company. The deterministic gates catch the recurring failure mode
# (ratchet exceeded / tsc break / mechanized bug-class regrowth / prose
# drift) with zero LLM cost, zero secrets, zero prod access, and zero
# risk of shipping an unverifiable change. The judgment-heavy deep audit
# stays a founder-triggered, human-in-the-loop run.

on:
  schedule:
    - cron: '0 6 * * *' # 06:00 UTC daily (~07:00 London / Lagos). Adjust freely.
  workflow_dispatch: {} # manual "Run workflow" button for validation / ad-hoc

# Least privilege: read the code, write an issue. NEVER contents:write.
permissions:
  contents: read
  issues: write

concurrency:
  group: nightly-audit
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  # Fake, never-connected URLs so `npm ci` postinstall (`prisma generate`)
  # + any env-presence validation pass. tsc / lint / audit-platform are
  # pure static analysis — they never open a DB connection. ZERO real
  # secrets are referenced by this workflow by design.
  DATABASE_URL: 'postgresql://ci:ci@localhost:5432/ci?schema=public'
  DIRECT_URL: 'postgresql://ci:ci@localhost:5432/ci?schema=public'

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Generate Prisma + zod-prisma-types (offline; tsc needs src/generated/zod)
        run: npx prisma generate

      - name: Run nightly audit
        id: audit
        continue-on-error: true
        # tee → file for the issue body; PIPESTATUS preserves the
        # runner's real exit code through the pipe (0 clean / 1 P0).
        run: |
          set -o pipefail
          node scripts/nightly-audit.mjs | tee nightly-report.md
          exit ${PIPESTATUS[0]}

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-audit-report
          path: nightly-report.md
          retention-days: 30

      - name: Open / update tracking issue on P0 regression
        if: steps.audit.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('nightly-report.md', 'utf8').slice(0, 60000);
            const TITLE = '🌙 Nightly audit — P0 regression on main';
            const { owner, repo } = context.repo;
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: 'open', per_page: 100,
            });
            const issue = existing.find(i => i.title === TITLE && !i.pull_request);
            if (issue) {
              await github.rest.issues.update({
                owner, repo, issue_number: issue.number, state: 'open',
              });
              await github.rest.issues.createComment({
                owner, repo, issue_number: issue.number,
                body: `Re-detected on \`${context.sha.slice(0, 7)}\` (${new Date().toISOString().slice(0,10)}):\n\n${body}`,
              });
              core.notice(`Updated tracking issue #${issue.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner, repo, title: TITLE,
                body: `${body}\n\n---\n_Auto-opened by the nightly audit. Report-only — no code was changed. Close this once the P0 is resolved; it will reopen/comment if it recurs._`,
              });
              core.notice(`Opened tracking issue #${created.data.number}`);
            }

      - name: Fail the run if P0 (so the Actions tab shows red)
        if: steps.audit.outcome == 'failure'
        run: |
          echo "Nightly audit found a P0 regression — see the tracking issue + the report artifact."
          exit 1
